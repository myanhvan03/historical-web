<!DOCTYPE html>
<html lang="en">
<head><script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <meta charset="UTF-8">
  <title>My History Portfolio</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { 
      font-family: Georgia, serif; 
      background: url('https://www.transparenttextures.com/patterns/aged-paper.png'); 
      color: #3e2f1c; margin: 0; 
    }
    header { background-color: #d9c7a3; padding: 20px; text-align: center; }
    nav a { margin: 0 15px; text-decoration: none; color: #3e2f1c; }
    section { padding: 20px; max-width: 800px; margin: auto; }
    h2 { border-bottom: 2px solid #d9c7a3; padding-bottom: 5px; }
    article { margin-bottom: 20px; }
    article h3 { margin: 0; }
    article p { margin: 5px 0; }
    form { display: flex; flex-direction: column; }
    form input, form textarea { margin-bottom: 10px; padding: 10px; border: 1px solid #d9c7a3; }
    form button { background-color: #3e2f1c; color: #fdf6e3; padding: 10px; border: none; cursor: pointer; }
    footer { background-color: #d9c7a3; text-align: center; padding: 10px; margin-top: 20px; }
    .icon { margin-right: 8px; color: #3e2f1c; }
  </style>
</head>
<body>
  <header>
    <h1><i class="fa-solid fa-feather icon"></i> My History Research</h1>
    <nav>
      <a href="#home"><i class="fa-solid fa-house icon"></i>Home</a>
      <a href="#blog"><i class="fa-solid fa-scroll icon"></i>Blog</a>
      <a href="#contact"><i class="fa-solid fa-envelope icon"></i>Contact</a>
    </nav>
  </header>

  <section id="home">
    <h2><i class="fa-solid fa-landmark icon"></i>Welcome</h2>
    <p>Exploring the past, one story at a time. This site shares my research, reflections, and discoveries in history.</p>
  </section>

  <section id="blog">
    <h2><i class="fa-solid fa-book-open icon"></i>Blog</h2>
    
  </section>

  <script>
  async function loadPosts() {
    const blogSection = document.getElementById('blog');
    
    try {
      // 1. Fetch the list of files from your GitHub _posts folder
      const response = await fetch('https://api.github.com/repos/myanhvan03/historical-web/contents/_posts');
      const files = await response.json();
      
      // 2. Loop through each file found
      for (const file of files) {
        if (file.name.endsWith('.md')) {
          // Fetch the raw text content of the markdown file
          const contentResponse = await fetch(file.download_url);
          const text = await contentResponse.text();
          
          // 3. Extract the Title, Date, and Body Content
          const titleMatch = text.match(/title:\s*(.*)/);
          const dateMatch = text.match(/date:\s*(.*)/);
          const bodyContent = text.split('---').pop().trim();
          
          const title = titleMatch ? titleMatch[1].replace(/['"]/g, '') : 'Untitled Post';
          const rawDate = dateMatch ? dateMatch[1] : '';
          const cleanDate = rawDate.split('T')[0]; // Cleans up the time stamps
          
          // 4. Create the HTML elements dynamically
          const article = document.createElement('article');
          
          article.innerHTML = `
            <h3>${title}</h3>
            <p><em>${cleanDate}</em></p>
            <p>${bodyContent.replace(/\n/g, '<br>')}</p>
          `;
          
          // 5. Inject it into your webpage's blog section
          blogSection.appendChild(article);
        }
      }
    } catch (error) {
      console.error('Error loading history posts:', error);
    }
  }

  // Run the function as soon as the page loads
  loadPosts();
</script>
  <section id="contact">
    <h2><i class="fa-solid fa-pen-nib icon"></i>Contact</h2>
    <form>
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit"><i class="fa-solid fa-paper-plane"></i> Send</button>
    </form>
    <p>Or email me directly at: <a href="mailto:yourname@example.com">yourname@example.com</a></p>
  </section>

  <footer>
    <p>&copy; 2026 My History Portfolio</p>
  </footer>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", (user) => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script></body>
</html>
